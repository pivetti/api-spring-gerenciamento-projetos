spring.application.name=demo
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/seu_banco}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:seu_usuario}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sua_senha}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
